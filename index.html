<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁 Presente Digital</title>

<style>

body{
margin:0;
background:#081320;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
overflow:hidden;
}

.card{

max-width:650px;
padding:40px;
border-radius:20px;

background:#0f1d33;

box-shadow:0 0 40px rgba(0,150,255,.3);

animation:fade 1s;

}

h1{

font-size:52px;
color:#4db8ff;
margin:0;

}

h2{

font-size:28px;
font-weight:normal;

}

p{

font-size:20px;
line-height:1.7;

}

button{

margin-top:30px;
padding:18px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:#1e88ff;
color:white;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.05);

background:#45a5ff;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{

opacity:1;
transform:translateY(0px);

}

}

</style>

</head>

<body>

<div class="card">

<h1>🎁</h1>

<h2>Este é o seu presente.</h2>

<p>

Obrigado por acompanhar meu trabalho.

Seu apoio significa muito mais do que você imagina.

Este presente não tem valor financeiro.

Ele representa minha gratidão por fazer parte da minha jornada.

</p>

<p>

<b>Com carinho,</b>

<br><br>

<b>Guilherme Simon 💙</b>

</p>

<button onclick="window.location.href='https://instagram.com/guilhermesimomm'">

Continuar acompanhando

</button>

</div>

</body>

</html>
